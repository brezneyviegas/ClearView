# ClearView routing policy
# Tier order: local -> cheap -> mid -> frontier
tiers:
  local:
    - ollama/llama3.2
  cheap:
    - anthropic/claude-haiku-4-5
    - openai/gpt-4o-mini
    - gemini/gemini-2.0-flash
    - ollama/llama3.2
  mid:
    - anthropic/claude-sonnet-4-6
    - openai/gpt-4o
    - gemini/gemini-2.5-flash
  frontier:
    - anthropic/claude-opus-4-8
    - openai/o3

# Plan/execute workflow routing.
# Plan turns route to the frontier tier; execution turns (agent loops carrying
# tool results / tool_calls) route to the local tier (ollama). Explicit
# x-clearview-stage: plan|execute header wins; auto_detect flags execute turns
# from message structure. x-clearview-tier still overrides everything.
stages:
  enabled: true
  plan: frontier
  execute: local
  auto_detect: true

# Rule engine (top-down, first match wins)
rules:
  - name: explicit_override
    if: { header: x-clearview-tier }
    then: header_value
  - name: long_prompt
    if: { tokens_gte: 4000 }
    then: frontier
  - name: stack_trace
    if: { stack_trace: true }
    then: mid
  - name: math_or_proof
    if: { math_symbols: true }
    then: mid
  - name: url_context
    if: { url: true }
    then: mid
  - name: code_context
    if: { file_path: true }
    then: mid
  - name: unfenced_multiline_code
    if: { multiline_code_no_fence: true }
    then: mid
  - name: tiny_prompt
    if: { tokens_lt: 200, no_code: true }
    then: cheap
  - name: complex_keywords
    if:
      contains_any:
        - refactor
        - architect
        - prove
        - derive
        - debug this stack
        - design system
    then: mid
  - name: imperative_work
    if: { imperative: true, tokens_gte: 200 }
    then: mid
  # Narrowed catch-all: only short no-code prompts default cheap. Anything
  # 500+ tokens (or shorter but code-bearing) that no rule caught now reaches
  # the classifier instead of being silently floored to cheap.
  - name: medium_prompt
    if: { tokens_lt: 500, no_code: true }
    then: cheap

# Classifier fallback (when no rule matches)
classifier:
  enabled: true
  model: anthropic/claude-haiku-4-5
  prompt: |
    Rate the complexity of the user prompt below on scale 1-5.
    1-2 = trivial (rename, format, simple Q).
    3 = moderate (small bug, short script).
    4 = hard (multi-file refactor, design choice).
    5 = expert (proof, architecture, novel algorithm).
    Output ONLY: score,confidence
    where score is 1-5 and confidence is 0.0-1.0.
    Example: 4,0.82
    No explanation.
    PROMPT:
    {prompt}
  confidence_floor: 0.65
  score_to_tier:
    1: cheap
    2: cheap
    3: mid
    4: mid
    5: frontier

# Escalation on failure / low confidence
escalation:
  on_error: true
  on_empty_response: true
  max_retries: 1

# Budget guard
budget:
  daily_usd_cap: 50.0
  on_breach: reject  # reject | warn | allow

# Baseline used for plan-equiv cost (drift % calculation)
baseline_model: anthropic/claude-opus-4-8
